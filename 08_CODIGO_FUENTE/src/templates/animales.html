<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animales</title>
<link rel="stylesheet" href="../static/styles.css">
</head>

<body>

<header class="topbar">
    <div class="brand">
        <img src="../static/img/logo.png" class="logo-main">
        <span class="brand-name">Ganadapp</span>
    </div>
</header>

<main class="container">

<h2>Gestión de Animales</h2>

<input id="codigo" placeholder="Código">
<input id="especie" placeholder="Especie">
<input id="raza" placeholder="Raza">
<input id="edad" type="number" placeholder="Edad">
<input id="estado" placeholder="Estado">

<button onclick="guardarAnimal()">Guardar</button>

<table border="1" width="100%">
<thead>
<tr>
<th>ID</th><th>Código</th><th>Especie</th><th>Raza</th><th>Edad</th><th>Estado</th><th>Acciones</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>

</main>

<script>

const API = "/api/animales";

let editandoId = null;

function getData(){
return {
codigo: document.getElementById("codigo").value,
especie: document.getElementById("especie").value,
raza: document.getElementById("raza").value,
edad: Number(document.getElementById("edad").value || 0),
estado: document.getElementById("estado").value
};
}

async function guardarAnimal(){

const payload = getData();

if(editandoId === null){

await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

}else{

await fetch(`${API}/${editandoId}`,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

editandoId=null;
}

listar();
}

async function listar(){

const res = await fetch(API);
const data = await res.json();

document.getElementById("lista").innerHTML = data.map(a => `
<tr>
<td>${a.id}</td>
<td>${a.codigo}</td>
<td>${a.especie}</td>
<td>${a.raza}</td>
<td>${a.edad}</td>
<td>${a.estado}</td>
<td>
<button onclick="editar(${a.id},'${a.codigo}','${a.especie}','${a.raza}',${a.edad},'${a.estado}')">Editar</button>
<button onclick="location.href='/sanidad?id=${a.id}'">Sanidad</button>
<button onclick="eliminar(${a.id})">Eliminar</button>
</td>
</tr>
`).join("");
}

function editar(id,codigo,especie,raza,edad,estado){

editandoId=id;

document.getElementById("codigo").value=codigo;
document.getElementById("especie").value=especie;
document.getElementById("raza").value=raza;
document.getElementById("edad").value=edad;
document.getElementById("estado").value=estado;
}

async function eliminar(id){
await fetch(`${API}/${id}`,{method:"DELETE"});
listar();
}

document.addEventListener("DOMContentLoaded",listar);

</script>

</body>
</html>
